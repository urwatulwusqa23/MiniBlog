name: Build & Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Build Angular ─────────────────────────────────────────────────────
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Angular dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      # ── 3. Copy Angular output → .NET wwwroot ────────────────────────────────
      - name: Copy Angular build into wwwroot
        run: cp -r dist/miniblog-angular/. MiniBlog/MiniBlog.web/wwwroot/

      # ── 4. Build .NET app ────────────────────────────────────────────────────
      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish .NET app
        run: |
          cd MiniBlog
          dotnet publish MiniBlog.web/MiniBlog.web.csproj \
            --configuration Release \
            --output ./publish

      # ── 5. Deploy to Azure App Service ───────────────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: MiniBlog/publish
